name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIX_ENV: test

jobs:
  test:
    name: Test (OTP ${{ matrix.otp }} / Elixir ${{ matrix.elixir }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.19"
            otp: "28"
            linters: true
          - elixir: "1.18"
            otp: "27"
            linters: false
          - elixir: "1.17"
            otp: "27"
            linters: false
          - elixir: "1.16"
            otp: "26"
            linters: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore dependency cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Install dependencies
        run: mix deps.get && mix deps.compile

      - name: Check formatting
        if: matrix.linters
        run: mix format --check-formatted

      - name: Run Credo
        if: matrix.linters
        run: mix credo

      - name: Restore PLT cache
        if: matrix.linters
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: plts-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            plts-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Create PLT directory
        if: matrix.linters
        run: mkdir -p priv/plts

      - name: Run Dialyzer
        if: matrix.linters
        run: mix dialyzer

      - name: Run tests
        run: mix test --warnings-as-errors

      - name: Compile without optional deps
        run: mix compile --force --warnings-as-errors --no-optional-deps
